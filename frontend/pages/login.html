<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Log In - Agesis AI</title>
        <link rel="stylesheet" href="../assets/css/variables.css" />
        <link rel="stylesheet" href="../assets/css/main.css" />
        <link rel="stylesheet" href="../assets/css/forms.css" />
        <link rel="stylesheet" href="../assets/css/login.css" />
        <link rel="icon" href="../assets/images/imagecroped.png" />
    </head>
    <body data-page="login">
        <div class="login-layout">
            <!-- Left Branding Panel -->
            <div class="login-panel-brand">
                <div class="login-brand-content">
                    <div class="login-brand-logo">Agesis <span>AI</span></div>
                    <h1 class="login-brand-headline">Intelligent Surveillance for a Safer World</h1>
                    <p class="login-brand-text">
                        Monitor, detect, and respond to critical events across your entire security
                        infrastructure from a single command center.
                    </p>
                </div>
            </div>

            <!-- Right Form Panel -->
            <div class="login-panel-form">
                <div class="login-form-container">
                    <div class="login-header">
                        <h2 class="login-title">Welcome back</h2>
                        <p class="login-subtitle">Enter your credentials to access your dashboard</p>
                    </div>

                    <div id="login-form-alert" class="form-alert">
                        <!-- Alert icon & text injected via JS -->
                    </div>

                    <form id="login-form" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-input"
                                placeholder="you@company.com"
                                required
                                aria-describedby="email-error" />
                            <div id="email-error" class="form-error" role="alert"></div>
                        </div>

                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="••••••••"
                                required
                                aria-describedby="password-error" />
                            <div id="password-error" class="form-error" role="alert"></div>
                        </div>

                        <div class="form-row">
                            <div class="form-checkbox">
                                <input type="checkbox" id="remember" name="remember" />
                                <label for="remember">Remember me</label>
                            </div>
                            <a href="#" class="form-link">Forgot password?</a>
                        </div>

                        <button
                            type="submit"
                            id="login-button"
                            class="btn btn-primary"
                            style="width: 100%; height: 44px; font-size: var(--text-small)">
                            Sign In
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Core Scripts -->
        <script src="../assets/js/config.js"></script>
        <script src="../assets/js/utils.js"></script>
        <script src="../assets/js/main.js"></script>

        <!-- Page-Specific Scripts -->
        <script src="../assets/js/validation.js"></script>
        <script src="../assets/js/auth.js"></script>
    </body>
</html>
