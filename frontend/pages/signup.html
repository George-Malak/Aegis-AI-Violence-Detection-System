<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign Up - Agesis AI</title>
        <link rel="stylesheet" href="../assets/css/variables.css" />
        <link rel="stylesheet" href="../assets/css/main.css" />
        <link rel="stylesheet" href="../assets/css/forms.css" />
        <link rel="stylesheet" href="../assets/css/login.css" />
        <link rel="icon" href="../assets/images/imagecroped.png" />
    </head>
    <body data-page="signup">
        <div class="login-layout">
            <!-- Left Branding Panel (Identical to Login) -->
            <div class="login-panel-brand">
                <div class="login-brand-content">
                    <div class="login-brand-logo">Agesis <span>AI</span></div>
                    <h1 class="login-brand-headline">Secure Your Infrastructure Today</h1>
                    <p class="login-brand-text">
                        Join the next generation of intelligent surveillance. Monitor, detect, and respond to
                        critical events across your entire security perimeter.
                    </p>
                </div>
            </div>

            <!-- Right Form Panel -->
            <div class="login-panel-form">
                <div class="login-form-container">
                    <div class="login-header">
                        <h2 class="login-title">Create an account</h2>
                        <p class="login-subtitle">Enter your details to get started</p>
                    </div>

                    <div id="signup-form-alert" class="form-alert">
                        <!-- Alert icon & text injected via JS -->
                    </div>

                    <form id="signup-form" novalidate>
                        <!-- Name Grid -->
                        <div class="auth-form-grid">
                            <div class="form-group">
                                <label for="first-name" class="form-label">First Name</label>
                                <input
                                    type="text"
                                    id="first-name"
                                    name="first-name"
                                    class="form-input"
                                    placeholder="John"
                                    required
                                    aria-describedby="first-name-error" />
                                <div id="first-name-error" class="form-error" role="alert"></div>
                            </div>
                            <div class="form-group">
                                <label for="last-name" class="form-label">Last Name</label>
                                <input
                                    type="text"
                                    id="last-name"
                                    name="last-name"
                                    class="form-input"
                                    placeholder="Doe"
                                    required
                                    aria-describedby="last-name-error" />
                                <div id="last-name-error" class="form-error" role="alert"></div>
                            </div>
                        </div>

                        <!-- Email & Org -->
                        <div class="form-group">
                            <label for="email" class="form-label">Work Email</label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-input"
                                placeholder="you@company.com"
                                required
                                aria-describedby="email-error" />
                            <div id="email-error" class="form-error" role="alert"></div>
                        </div>

                        <div class="form-group">
                            <label for="organization" class="form-label">Organization Name</label>
                            <input
                                type="text"
                                id="organization"
                                name="organization"
                                class="form-input"
                                placeholder="Global Secure Corp"
                                required
                                aria-describedby="org-error" />
                            <div id="org-error" class="form-error" role="alert"></div>
                        </div>

                        <!-- Passwords -->
                        <div class="auth-form-grid">
                            <div class="form-group">
                                <label for="password" class="form-label">Password</label>
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="form-input"
                                    placeholder="8+ characters"
                                    required
                                    aria-describedby="password-error" />
                                <div id="password-error" class="form-error" role="alert"></div>
                            </div>
                            <div class="form-group">
                                <label for="confirm-password" class="form-label">Confirm Password</label>
                                <input
                                    type="password"
                                    id="confirm-password"
                                    name="confirm-password"
                                    class="form-input"
                                    placeholder="••••••••"
                                    required
                                    aria-describedby="confirm-password-error" />
                                <div id="confirm-password-error" class="form-error" role="alert"></div>
                            </div>
                        </div>

                        <!-- Terms and Conditions -->
                        <div class="form-group">
                            <div class="form-checkbox">
                                <input type="checkbox" id="terms" name="terms" required />
                                <label for="terms"
                                    >I agree to the <a href="#" class="form-link">Terms of Service</a> and
                                    <a href="#" class="form-link">Privacy Policy</a></label
                                >
                            </div>
                            <div id="terms-error" class="form-error" role="alert"></div>
                        </div>

                        <button
                            type="submit"
                            id="signup-button"
                            class="btn btn-primary"
                            style="width: 100%; height: 44px; font-size: var(--text-small)">
                            Create Account
                        </button>
                    </form>

                    <!-- Footer Link -->
                    <div
                        style="
                            text-align: center;
                            margin-top: var(--space-6);
                            font-size: var(--text-small);
                            color: var(--color-text-muted);
                        ">
                        Already have an account? <a href="login.html" class="form-link">Sign in</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script src="../assets/js/config.js"></script>
        <script src="../assets/js/utils.js"></script>
        <script src="../assets/js/main.js"></script>
        <script src="../assets/js/validation.js"></script>
        <script src="../assets/js/auth.js"></script>
    </body>
</html>
